version: '3.8'
services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sipetrus-be
    container_name: sipetrus-be
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - psc-network

  web:
    image: nginx:alpine
    container_name: sipetrus-api
    restart: unless-stopped
    ports:
      - "8001:80"
    volumes:
      - .:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - psc-network

networks:
  psc-network:
    external: true

volumes:
  dbdata:
    driver: local
